run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - revive
    - gosimple
    - gofmt
    - ineffassign
    - gosec

linters-settings:
  errcheck:
    check-blank: true
  revive:
    confidence: 0.8

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck